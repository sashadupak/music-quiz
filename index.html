      {text:'«Bohemian Rhapsody»?',opts:['Led Zeppelin','Pink Floyd','Queen','The Beatles'],c:2},
      {text:'Сколько в Radiohead?',opts:['3','4','5','6'],c:2}
    ]}
];

// ═══ BUILD SLIDES ═══
// 0: Lobby
mk(`<div style="text-align:center;max-width:460px">
  <div style="font-size:2.3rem;margin-bottom:.4rem">🧪🎵</div>
  <h1 style="font-family:var(--fd);font-size:1.8rem;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.4rem">ДЕМО-КВИЗ</h1>
  <p style="color:var(--dim);font-size:.8rem;margin-bottom:1.2rem;line-height:1.5">Мультиплеер на двоих. 7 раундов.<br><strong style="color:var(--accent2)">Финал ×3 — переворачивает всё!</strong></p>
  <input class="inp" id="iName" placeholder="Ваше имя" style="margin-bottom:.8rem"/>
  <div style="display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap">
    <button class="btn b1" id="bCr">Создать комнату</button>
    <button class="btn b2" id="bJn">Присоединиться</button>
  </div>
  <div id="jnUI" style="display:none;margin-top:.8rem">
    <input class="inp" id="iCode" placeholder="Код комнаты" style="margin-bottom:.4rem;text-transform:uppercase"/>
    <br><button class="btn b1 bs" id="bJnGo" style="margin-top:.4rem">Войти →</button>
  </div>
  <div class="status-line" id="lSt"></div>
</div>`);

// 1: Waiting
mk(`<div style="text-align:center;max-width:420px">
  <button class="bb" onclick="back()">← Назад</button>
  <div style="font-size:1.8rem;margin-bottom:.4rem">📡</div>
  <p style="font-size:.8rem;color:var(--dim);margin-bottom:.5rem">Код комнаты:</p>
  <div class="lc" id="shCode">—</div>
  <p style="font-size:.75rem;color:var(--dim);margin-bottom:.8rem">Отправьте код второму игроку</p>
  <div id="lPlrs"></div>
  <div class="wt" id="wMsg">Ожидание второго игрока...</div>
  <button class="btn b1" id="bSt" style="display:none;margin-top:.8rem">Начать квиз! →</button>
</div>`);

// Round slides
let RS={};
R.forEach((r,ri)=>{
  const intro=mk(`<div class="ri">
    <button class="bb" onclick="back()">← Назад</button>
    <div class="rn">Раунд ${ri+1} из ${R.length}</div>
    <div class="rt">${r.icon} ${r.name}</div>
    <div class="rd">${r.desc}</div>
    <div class="rr">${r.rules}</div>
    <div class="rw">Множитель: ×${r.w}</div>
    <button class="btn b1 rgo" data-ri="${ri}">Поехали →</button>
  </div>`);
  RS[ri]={intro,q:[]};

  if(r.type==='compete'||r.type==='blitz'){
    r.qs.forEach((q,qi)=>{
      const em=q.emoji?`<div class="eq">${q.emoji}</div>`:'';
      const tx=q.text?`<div class="qt">${q.text}</div>`:'';
      const secs=r.type==='blitz'?10:15;
      RS[ri].q.push(mk(`<div class="qc">
        <button class="bb" onclick="back()">← Назад</button>
        <div class="ti cp"><div class="pd"></div> Кто быстрее!</div>
        <div class="qb">Раунд ${ri+1} ${r.type==='blitz'?'• Блиц '+(qi+1)+'/'+r.qs.length:'• ×'+r.w}</div>
        ${em}${tx}
        <div class="tb"><div class="fl" id="tf_${ri}_${qi}" style="width:100%"></div></div>
        <div class="tt" id="tx_${ri}_${qi}">${secs}</div>
        <div class="ag" id="ag_${ri}_${qi}">${q.opts.map((o,oi)=>`<button class="ba" data-ri="${ri}" data-qi="${qi}" data-oi="${oi}"><span class="lt">${'ABCD'[oi]}</span>${o}</button>`).join('')}</div>
        <div class="st" id="st_${ri}_${qi}"></div>
        <div class="wt" id="wt_${ri}_${qi}" style="display:none">Ждём соперника...</div>
      </div>`));
    });
  }

  if(r.type==='coop'){
    const L=r.pairs.map(p=>p.l).sort(()=>Math.random()-.5);
    const Ri=r.pairs.map(p=>p.r).sort(()=>Math.random()-.5);
    RS[ri].q.push(mk(`<div class="qc" style="max-width:520px">
      <button class="bb" onclick="back()">← Назад</button>
      <div class="ti co"><div class="pd"></div> Вы — команда!</div>
      <div class="qb">Раунд ${ri+1} • Кооператив</div>
      <div class="qt">Соедините артиста с фактом</div>
      <div class="mg">
        <div><div class="ml">Артист</div>${L.map(l=>`<div class="mi" data-s="l" data-v="${l}">${l}</div>`).join('')}</div>
        <div><div class="ml">Факт</div>${Ri.map(r=>`<div class="mi" data-s="r" data-v="${r}">${r}</div>`).join('')}</div>
      </div>
      <div id="mSt" style="margin-top:.6rem;font-size:.8rem;color:var(--dim)">Выберите одного слева и одного справа</div>
    </div>`));
  }

  if(r.type==='private'){
    RS[ri].q.push(mk(`<div class="qc">
      <button class="bb" onclick="back()">← Назад</button>
      <div class="ti cp"><div class="pd"></div> Свой вопрос!</div>
      <div class="qb">Раунд ${ri+1} • Личный</div>
      <div class="qt" id="pQ">Загрузка...</div>
      <div class="ag">
        <button class="ba" data-ri="${ri}" data-qi="0" data-oi="true" style="text-align:center"><span class="lt" style="background:rgba(34,197,94,.2);color:var(--ok)">✓</span> Факт</button>
        <button class="ba" data-ri="${ri}" data-qi="0" data-oi="false" style="text-align:center"><span class="lt" style="background:rgba(239,68,68,.2);color:var(--no)">✗</span> Фейк</button>
      </div>
      <div class="wt" id="pW" style="display:none">Ждём соперника...</div>
    </div>`));
  }

  if(r.type==='stake'){
    const fh=r.facts.map((f,j)=>`<div id="sf${j}" style="opacity:0;transform:translateY(8px);transition:all .4s;margin-bottom:.4rem;padding:.5rem .8rem;background:var(--surface2);border-radius:9px;border-left:3px solid ${['var(--accent)','var(--accent3)','var(--accent2)'][j]}"><span style="font-weight:700;color:var(--dim);margin-right:.4rem">Факт ${j+1}:</span>${f}</div>`).join('');
    RS[ri].q.push(mk(`<div class="qc">
      <button class="bb" onclick="back()">← Назад</button>
      <div class="ti cp"><div class="pd"></div> Ставка!</div>
      <div class="qb">Раунд ${ri+1} • ×${r.w}</div>
      <div style="max-width:420px;margin:0 auto .8rem">${fh}</div>
      <button class="btn b2 bs" id="sRev" data-nx="0">Открыть факт 1 →</button>
      <div id="skL" style="display:none;margin-top:.6rem;font-size:.8rem;color:var(--dim)">Ваша ставка:</div>
      <div class="sr" id="skR" style="display:none">
        <button class="sb_" data-sk="1">1</button><button class="sb_" data-sk="2">2</button><button class="sb_" data-sk="3">3</button>
      </div>
      <div class="ag" id="skO">${r.opts.map((o,oi)=>`<button class="ba sk-a" data-ri="${ri}" data-qi="0" data-oi="${oi}" style="display:none"><span class="lt">${'ABCD'[oi]}</span>${o}</button>`).join('')}</div>
    </div>`));
  }
});

const resI=mk(`<div class="res">
  <div class="crn">🏆</div>
  <div class="wn" id="rW">—</div>
  <p style="color:var(--dim);margin-bottom:.4rem" id="rSb">—</p>
  <div class="fc">
    <div class="fcd"><div class="fn" id="fn1">—</div><div class="fv" id="fv1">0</div></div>
    <div class="fcd"><div class="fn" id="fn2">—</div><div class="fv" id="fv2">0</div></div>
  </div>
  <p style="color:var(--accent);font-family:var(--fd);font-size:.75rem;font-weight:600;margin:.8rem 0">✅ Все механики протестированы!</p>
  <button class="btn b1" onclick="location.reload()">Заново 🔄</button>
</div>`);

// ═══ GAME STATE ═══
let scores=[0,0], curR=-1, timers={}, myStake=1, fRev=0, mSel={l:null,r:null}, mCnt=0;

// ═══ LOBBY ═══
document.getElementById('bCr').onclick=async()=>{
  AU.e();AU.cl();
  const nm=document.getElementById('iName').value.trim()||'Игрок 1';
  ROOM=Math.random().toString(36).substring(2,6).toUpperCase();
  ME=1;
  await write('p1',{name:nm});
  await write('phase','lobby');
  document.getElementById('shCode').textContent=ROOM;
  document.getElementById('lPlrs').innerHTML=`<div class="cb">✓ ${nm} (вы)</div>`;
  go(1);
  // Listen for p2
  listen('p2',v=>{
    if(!v)return;
    document.getElementById('lPlrs').innerHTML=`<div class="cb">✓ ${nm} (вы)</div><div class="cb">✓ ${v.name}</div>`;
    document.getElementById('wMsg').style.display='none';
    document.getElementById('bSt').style.display='inline-flex';
  });
  listen('phase',v=>{if(v==='playing')startFromListen();});
};

document.getElementById('bJn').onclick=()=>{document.getElementById('jnUI').style.display='block';};

document.getElementById('bJnGo').onclick=async()=>{
  AU.e();AU.cl();
  const nm=document.getElementById('iName').value.trim()||'Игрок 2';
  const code=document.getElementById('iCode').value.trim().toUpperCase();
  if(!code){document.getElementById('lSt').textContent='Введите код!';return;}
  ROOM=code; ME=2;
  document.getElementById('lSt').textContent='Подключение...';
  const p1=await read('p1');
  if(!p1){document.getElementById('lSt').innerHTML='Комната <b>'+ROOM+'</b> не найдена';return;}
  await write('p2',{name:nm});
  document.getElementById('shCode').textContent=ROOM;
  document.getElementById('lPlrs').innerHTML=`<div class="cb">✓ ${p1.name}</div><div class="cb">✓ ${nm} (вы)</div>`;
  document.getElementById('wMsg').textContent='Ожидание запуска...';
  go(1);
  listen('phase',v=>{if(v==='playing')startFromListen();});
};

document.getElementById('bSt').onclick=async()=>{
  AU.rs();
  await write('phase','playing');
  await write('scores',[0,0]);
};

async function startFromListen(){
  unlisten('phase');
  const p1=await read('p1'), p2=await read('p2');
  if(!p1||!p2)return;
  document.getElementById('sn1').textContent=p1.name;
  document.getElementById('sn2').textContent=p2.name;
  if(ME===1)document.getElementById('sp1').classList.add('me');
  else document.getElementById('sp2').classList.add('me');
  showSB(true); hist=[];
  goToRound(0);
  // Live score sync
  listen('scores',v=>{if(v){scores=v;updSc(v[0],v[1]);}});
}

function goToRound(ri){
  curR=ri;setRL(`Раунд ${ri+1}`);setDots(ri,R.length);AU.rs();go(RS[ri].intro);
  if(R[ri].type==='private'){
    setTimeout(()=>{
      const q=ME===1?R[ri].q1:R[ri].q2;
      const el=document.getElementById('pQ');
      if(el)el.textContent='«'+q.fact+'»';
    },100);
  }
}

// Round go buttons
document.addEventListener('click',e=>{
  const b=e.target.closest('.rgo');if(!b)return;AU.cl();
  const ri=parseInt(b.dataset.ri);
  go(RS[ri].q[0]);
  if(R[ri].type==='compete'||R[ri].type==='blitz'){
    R[ri].qs.forEach((_,qi)=>startTimer(ri,qi,R[ri].type==='blitz'?10:15));
  }
});

function startTimer(ri,qi,s){
  let rem=s;const k=ri+'_'+qi;
  const fl=document.getElementById('tf_'+k),tx=document.getElementById('tx_'+k);
  timers[k]={start:Date.now(),iv:setInterval(()=>{
    rem--;if(tx)tx.textContent=rem;if(fl)fl.style.width=(rem/s*100)+'%';
    if(rem<=3&&rem>0)AU.tk();
    if(rem<=0){clearInterval(timers[k].iv);document.querySelectorAll(`#ag_${k} .ba`).forEach(b=>b.classList.add('lk'));}
  },1e3)};
}

// ═══ ANSWER HANDLER ═══
document.addEventListener('click',async e=>{
  const b=e.target.closest('.ba');if(!b||b.classList.contains('lk'))return;AU.cl();
  const ri=parseInt(b.dataset.ri),qi=parseInt(b.dataset.qi),oi=b.dataset.oi;
  const r=R[ri];
  const tk=ri+'_'+qi;
  const elapsed=timers[tk]?(Date.now()-timers[tk].start)/1e3:0;
  // Lock
  const grid=b.closest('.ag');
  grid.querySelectorAll('.ba').forEach(x=>x.classList.add('lk'));
  if(timers[tk])clearInterval(timers[tk].iv);
  // Write answer to firebase
  await write(`answers/r${ri}_q${qi}_p${ME}`,{answer:oi,time:elapsed,ts:Date.now()});

  let ok=false, det='', pts=0;

  if(r.type==='compete'||r.type==='blitz'){
    const q=r.qs[qi];ok=parseInt(oi)===q.c;det=q.det||'Ответ: '+q.opts[q.c];
    grid.querySelectorAll('.ba').forEach((x,i)=>{if(i===q.c)x.classList.add('ok');});
    if(ok){b.classList.add('ok');AU.ok();const spd=elapsed<5?2:elapsed<10?1:0;pts=(1+spd)*r.w;scores[ME-1]+=pts;bump(ME);}
    else{b.classList.add('no');AU.no();}
    const se=document.getElementById('st_'+tk);if(se)se.textContent='Время: '+elapsed.toFixed(1)+'с';
  }

  if(r.type==='private'){
    const q=ME===1?r.q1:r.q2;ok=(oi==='true')===q.ans;det=q.det;
    if(ok){b.classList.add('ok');AU.ok();pts=r.w;scores[ME-1]+=pts;bump(ME);}
    else{b.classList.add('no');AU.no();}
  }

  if(r.type==='stake'){
    ok=parseInt(oi)===r.c;det=r.det;
    grid.querySelectorAll('.ba').forEach((x,i)=>{if(i===r.c)x.classList.add('ok');});
    if(ok){b.classList.add('ok');AU.ok();pts=myStake*r.w;scores[ME-1]+=pts;bump(ME);}
    else{b.classList.add('no');AU.no();pts=-myStake;scores[ME-1]=Math.max(0,scores[ME-1]+pts);}
  }

  await write('scores',scores);updSc(scores[0],scores[1]);

  // Check opponent answer
  const oppKey=`answers/r${ri}_q${qi}_p${ME===1?2:1}`;
  const opp=await read(oppKey);
  let oppInfo='';
  if(opp){
    oppInfo=`Соперник: ${opp.time?.toFixed(1)||'?'}с`;
  }

  setTimeout(()=>{
    showFB(ok?'🎉':'😬', ok?'Верно!':'Мимо!', det,
      pts>0?`+${pts} (×${r.w})`:pts<0?`${pts}`:'',
      elapsed>0?`Вы: ${elapsed.toFixed(1)}с ${oppInfo}`:'',
      ()=>{
        if(r.type==='blitz'&&qi<r.qs.length-1){go(RS[ri].q[qi+1]);startTimer(ri,qi+1,10);}
        else if(ri<R.length-1)goToRound(ri+1);
        else showResults();
      }
    );
  },500);
});

// ═══ MATCH PAIRS (coop) ═══
document.addEventListener('click',e=>{
  const mi=e.target.closest('.mi');if(!mi||mi.classList.contains('md'))return;AU.cl();
  const side=mi.dataset.s;
  document.querySelectorAll(`.mi[data-s="${side}"]`).forEach(m=>m.classList.remove('sel'));
  mi.classList.add('sel');mSel[side]=mi.dataset.v;
  if(mSel.l&&mSel.r){
    const r=R[2];
    const pr=r.pairs.find(p=>p.l===mSel.l&&p.r===mSel.r);
    if(pr){
      AU.ok();document.querySelectorAll('.mi.sel').forEach(m=>{m.classList.remove('sel');m.classList.add('md');});
      mCnt++;scores[0]+=r.w;scores[1]+=r.w;updSc(scores[0],scores[1]);bump(1);bump(2);
      write('scores',scores);
      document.getElementById('mSt').textContent=`Найдено: ${mCnt}/${r.pairs.length}`;
      if(mCnt===r.pairs.length){
        setTimeout(()=>showFB('🤝','Команда!',`Все ${r.pairs.length} пары!`,`+${r.pairs.length} каждому`,'',()=>goToRound(3)),400);
      }
    } else {
      AU.no();document.querySelectorAll('.mi.sel').forEach(m=>{m.classList.add('wf');setTimeout(()=>m.classList.remove('wf','sel'),400);});
      document.getElementById('mSt').textContent='Не совпало!';
    }
    mSel={l:null,r:null};
  }
});

// ═══ STAKE ═══
document.getElementById('sRev')?.addEventListener('click',function(){
  AU.cl();const n=parseInt(this.dataset.nx), r=R[5];
  if(n<r.facts.length){
    const el=document.getElementById('sf'+n);el.style.opacity='1';el.style.transform='translateY(0)';
    fRev=n+1;
    if(n+1<r.facts.length){this.textContent=`Открыть факт ${n+2} →`;this.dataset.nx=n+1;}
    else{this.textContent='Все факты открыты';this.disabled=true;this.style.opacity='.4';this.dataset.nx=n+1;}
    document.getElementById('skL').style.display='block';
    document.getElementById('skR').style.display='flex';
    document.querySelectorAll('.sk-a').forEach(b=>b.style.display='block');
  }
});
document.querySelectorAll('.sb_').forEach(b=>{b.addEventListener('click',()=>{
  AU.cl();document.querySelectorAll('.sb_').forEach(x=>x.classList.remove('pk'));
  b.classList.add('pk');myStake=parseInt(b.dataset.sk);
});});

// ═══ RESULTS ═══
function showResults(){
  AU.ff();confetti();go(resI);setRL('Финал');setDots(R.length,R.length);
  const n1=document.getElementById('sn1').textContent,n2=document.getElementById('sn2').textContent;
  document.getElementById('fn1').textContent=n1;document.getElementById('fn2').textContent=n2;
  document.getElementById('fv1').textContent=scores[0];document.getElementById('fv2').textContent=scores[1];
  if(scores[0]>scores[1]){document.getElementById('rW').textContent=n1;document.getElementById('rSb').textContent='Победа!';}
  else if(scores[1]>scores[0]){document.getElementById('rW').textContent=n2;document.getElementById('rSb').textContent='Победа!';}
  else{document.getElementById('rW').textContent='Ничья!';document.getElementById('rSb').textContent='Оба великолепны!';}
  // Cleanup firebase room after 5 min
  setTimeout(()=>{db.ref('rooms/'+ROOM).remove();},3e5);
}

go(0);
</script>
</body>
</html>
