<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--fb)}
body::before{content:'';position:fixed;inset:0;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9999}
.gorb{position:fixed;width:350px;height:350px;border-radius:50%;filter:blur(100px);opacity:0.07;pointer-events:none;z-index:-1}
.gorb.o1{background:var(--accent);top:-80px;right:-80px}.gorb.o2{background:var(--accent2);bottom:-80px;left:-80px}

/* Slides */
.sl{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;opacity:0;transform:translateY(25px);transition:opacity .45s ease,transform .45s ease;pointer-events:none;overflow-y:auto}
.sl.on{opacity:1;transform:translateY(0);pointer-events:all}

/* Scorebar */
#sb{position:fixed;top:0;left:0;right:0;height:50px;background:linear-gradient(180deg,rgba(10,10,15,.97),rgba(10,10,15,.85));backdrop-filter:blur(12px);display:none;align-items:center;justify-content:space-between;padding:0 1.2rem;z-index:100;border-bottom:1px solid rgba(255,255,255,.06);font-family:var(--fd)}
#sb.vis{display:flex}
.sp{display:flex;align-items:center;gap:.5rem;font-size:.8rem;font-weight:600}
.sp .sn{color:var(--dim);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sp .ss{font-size:1.2rem;font-weight:800;background:linear-gradient(135deg,var(--accent),#ffdd80);-webkit-background-clip:text;-webkit-text-fill-color:transparent;transition:transform .3s;min-width:2ch;text-align:center}
.sp .ss.bump{transform:scale(1.4)}
.sp.me .sn{color:var(--accent3)}
.sc{text-align:center}
.sc .rl{font-size:.6rem;color:var(--dim);letter-spacing:2px;text-transform:uppercase}
.dots{display:flex;gap:3px;justify-content:center;margin-top:2px}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.12)}.dot.dn{background:var(--accent)}.dot.cu{background:var(--accent);box-shadow:0 0 6px var(--accent)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:.5rem;padding:.85rem 2rem;border:none;border-radius:100px;font-family:var(--fd);font-size:.9rem;font-weight:700;cursor:pointer;transition:all .25s}
.b1{background:linear-gradient(135deg,var(--accent),#ffb347);color:#0a0a0f}.b1:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(240,192,64,.3)}.b1:disabled{opacity:.4;cursor:default;transform:none;box-shadow:none}
.b2{background:var(--surface2);color:var(--text);border:1px solid rgba(255,255,255,.1)}.b2:hover{background:rgba(255,255,255,.08)}
.bs{padding:.5rem 1.1rem;font-size:.72rem}

.ba{display:block;width:100%;max-width:480px;padding:.9rem 1.2rem;background:var(--surface2);border:2px solid rgba(255,255,255,.08);border-radius:14px;color:var(--text);font-family:var(--fb);font-size:.9rem;text-align:left;cursor:pointer;transition:all .2s;margin:.3rem auto}

.ba.ok{border-color:var(--ok);background:rgba(34,197,94,.15)}.ba.no{border-color:var(--no);background:rgba(239,68,68,.1);animation:shk .4s}.ba.lk{pointer-events:none;opacity:.5}

.ag{display:flex;flex-direction:column;width:100%;max-width:480px;margin:0 auto}
.wt{font-size:.85rem;color:var(--dim);margin-top:.8rem;animation:bl 1.5s ease infinite}

/* Feedback overlay */

.fo.sh{opacity:1;pointer-events:all}

/* Round summary */

.rsm .rsm-t{font-family:var(--fd);font-size:1.2rem;font-weight:800;margin-bottom:.8rem}
.rsm .rsm-sc{display:flex;justify-content:center;gap:2rem;margin:.8rem 0}
.rsm .rsm-p{text-align:center;min-width:80px}

.rsm .rsm-bar div{height:100%;transition:width .5s ease}
.rsm .rsm-msg{font-size:.85rem;color:var(--accent3);font-style:italic;margin:.6rem 0;line-height:1.5}

/* Alias */
.alias-card{font-family:var(--fd);font-size:1.3rem;font-weight:700;padding:1.5rem;background:var(--surface2);border:2px solid var(--accent);border-radius:16px;margin:1rem 0;min-height:80px;display:flex;align-items:center;justify-content:center;text-align:center}
.alias-score-big{font-family:var(--fd);font-size:2.5rem;font-weight:900;color:var(--accent);margin:.5rem 0}

/* Countdown overlay */
.cd-overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:250;background:rgba(10,10,15,.92);backdrop-filter:blur(12px)}
.cd-num{font-family:var(--fd);font-size:6rem;font-weight:900;color:var(--accent);animation:cdpop .7s cubic-bezier(.34,1.56,.64,1)}
@keyframes cdpop{from{transform:scale(0);opacity:0}70%{transform:scale(1.2);opacity:1}to{transform:scale(1)}}

/* Sound guess play bar */
.sg-bar{width:100%;max-width:480px;margin:1rem auto;padding:1rem;background:var(--surface2);border-radius:14px;border:1px solid rgba(255,255,255,.08)}

.sg-bar .sg-prog{width:100%;height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.sg-bar .sg-fill{height:100%;background:linear-gradient(90deg,var(--accent4),var(--accent));border-radius:2px;transition:width .2s linear}

@media(max-width:600px){.sl{padding:1rem}.fc{flex-direction:column;gap:.7rem}.fo .fsc-row{gap:1rem}}
</style>

function ref(path){ return db.ref(`rooms/${ROOM}/${path}`); }
function write(path,val){ return ref(path).set(val); }
function read(path){ return ref(path).once('value').then(s=>s.val()); }
function listen(path,cb){ ref(path).on('value',s=>cb(s.val())); }
function unlisten(path){ ref(path).off(); }

function trigger(name){ return write(`triggers/${name}`, Date.now()); }

// ═══════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════
const AU={c:null,
  i(){this.c=new(window.AudioContext||window.webkitAudioContext)},
  e(){if(!this.c)this.i();if(this.c.state==='suspended')this.c.resume()},
  p(t,f=440,d=.15){this.e();const o=this.c.createOscillator(),g=this.c.createGain();o.connect(g);g.connect(this.c.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(.12,this.c.currentTime);g.gain.exponentialRampToValueAtTime(.001,this.c.currentTime+d);o.start();o.stop(this.c.currentTime+d)},
  ok(){this.p('sine',523,.1);setTimeout(()=>this.p('sine',659,.1),100);setTimeout(()=>this.p('sine',784,.2),200)},
  no(){this.p('sawtooth',200,.15);setTimeout(()=>this.p('sawtooth',150,.25),150)},

};

// ═══════════════════════════════════════
// SONG PLAYER — mp3 from songs/ folder
// ═══════════════════════════════════════
let currentAudio = null;
function playSong(src, startAt=0){
  stopSong();
  const a = new Audio(src);
  a.currentTime = startAt;
  a.play().catch(()=>{});
  currentAudio = a;
  return a;
}
function stopSong(){
  if(currentAudio){ currentAudio.pause(); currentAudio.currentTime=0; currentAudio=null; }
}
// Play a celebration clip after correct answer
function playClip(src, startAt=0, duration=8){
  stopSong();
  const a = new Audio(src);
  a.currentTime = startAt;
  a.play().catch(()=>{});
  currentAudio = a;
  setTimeout(()=>{ if(currentAudio===a){ a.pause(); currentAudio=null; } }, duration*1000);
}

// ═══════════════════════════════════════
// FUZZY MATCH
// ═══════════════════════════════════════
const FM={
  norm(s){return s.toLowerCase().replace(/ё/g,'е').replace(/[^\wа-яa-z0-9\s]/gi,'').trim()},
  lev(a,b){
    const m=a.length,n=b.length;
    const d=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));
    for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)
      d[i][j]=a[i-1]===b[j-1]?d[i-1][j-1]:1+Math.min(d[i-1][j],d[i][j-1],d[i-1][j-1]);
    return d[m][n];
  },
  check(input, accepted){
    const n=this.norm(input);
    if(!n) return {match:false,score:0};
    for(const a of accepted){
      const t=this.norm(a);
      if(n===t) return {match:true,score:1,matched:a};
      if(n.includes(t)||t.includes(n)) return {match:true,score:.9,matched:a};
      const dist=this.lev(n,t);
      const thr=Math.max(2,Math.floor(t.length*.25));
      if(dist<=thr) return {match:true,score:.8,matched:a};
    }
    return {match:false,score:0};
  }
};

// SCORING
// ═══════════════════════════════════════
function addScore(pts){
  scores[MEKEY()] += pts;
  write(`scores/${MEKEY()}`, scores[MEKEY()]);
  updScorebar();
}
function updScorebar(){
  const el1 = document.getElementById('ss1');
  const el2 = document.getElementById('ss2');
  if(el1) el1.textContent = scores.p1;
  if(el2) el2.textContent = scores.p2;
  // Bump animation
  const myEl = ME===1 ? el1 : el2;
  if(myEl){ myEl.classList.add('bump'); setTimeout(()=>myEl.classList.remove('bump'),300); }
}
function updDots(ri, qi, total){
  const rl = document.getElementById('rl');
  const dts = document.getElementById('dts');
  if(rl) rl.textContent = R[ri].name;
  if(dts){
    dts.innerHTML='';
    for(let i=0;i<total;i++){
      const d=document.createElement('div');
      d.className='dot'+(i<qi?' dn':'')+(i===qi?' cu':'');
      dts.appendChild(d);
    }
  }
}

// FEEDBACK OVERLAY
// ═══════════════════════════════════════
const fo = document.getElementById('fo');
function showFeedback(ok, pts, detail, cb){
  document.getElementById('fi_i').textContent = ok ? '✅' : '❌';
  document.getElementById('fi_t').textContent = ok ? (pts>2?'Отлично!':'Правильно!') : 'Неправильно';
  document.getElementById('fi_d').textContent = detail||'';
  document.getElementById('fi_p').textContent = pts>0 ? `+${pts} очк.` : pts<0 ? `${pts} очк.` : '';
  // Speed text
  document.getElementById('fi_s').textContent = '';
  // Scores
  const sc = document.getElementById('fi_sc');
  const lead = scores[MEKEY()] >= scores[OTHER()] ? MEKEY() : OTHER();
  const diff = Math.abs(scores.p1 - scores.p2);
  sc.innerHTML = `
    <div class="fsc-row">
      <div class="fsc-p"><div class="fsc-n">${names.p1||'Игрок 1'}</div><div class="fsc-v ${lead==='p1'?'ld':'tl'}">${scores.p1}</div></div>
      <div class="fsc-p"><div class="fsc-n">${names.p2||'Игрок 2'}</div><div class="fsc-v ${lead==='p2'?'ld':'tl'}">${scores.p2}</div></div>
    </div>
    ${diff>0?`<div class="fsc-lead">${names[lead]||lead} ведёт с отрывом ${diff}</div>`:`<div class="fsc-lead">Ничья!</div>`}
  `;
  fo.classList.add('sh');
  if(ok) AU.ok(); else AU.no();
  // Play clip if available
  const nextBtn = document.getElementById('fi_n');
  nextBtn.onclick = ()=>{
    fo.classList.remove('sh');
    stopSong();
    if(cb) cb();
  };
}

// ═══════════════════════════════════════
// TIMER
// ═══════════════════════════════════════
let timerInterval=null, timerRemaining=0;
function startTimer(seconds, ttEl, tbEl, onExpire){
  clearInterval(timerInterval);
  timerRemaining = seconds;
  const total = seconds;
  const update = ()=>{
    if(ttEl) ttEl.textContent = timerRemaining;
    if(tbEl){
      const pct = Math.max(0, (timerRemaining/total)*100);
      tbEl.style.width = pct+'%';
    }
  };
  update();
  timerInterval = setInterval(()=>{
    timerRemaining--;
    if(timerRemaining <= 0){
      timerRemaining = 0;
      update();
      clearInterval(timerInterval);
      timerInterval = null;
      if(onExpire) onExpire();
    } else {
      update();
      if(timerRemaining <= 5) AU.tk();
    }
  },1000);
}
function stopTimer(){
  clearInterval(timerInterval);
  timerInterval=null;
}

// ENCOURAGING PHRASES
// ═══════════════════════════════════════
function getMotivation(ri){
  const myS = scores[MEKEY()], theirS = scores[OTHER()];
  const isLast = ri >= R.length-1;
  const nextW = ri < R.length-1 ? R[ri+1].w : 0;
  if(isLast) return '🏁 Это был финал! Сейчас узнаем результат!';
  if(myS < theirS){
    if(nextW>=3) return '😤 Не сдавайся! Следующий раунд ×'+nextW+' — один вопрос может всё изменить!';
    return '💪 Ещё всё впереди! Множитель будет расти!';
  }
  if(myS > theirS){
    return '🔥 Отличная работа! Но расслабляться рано — множитель растёт!';
  }
  return '⚖️ Равная борьба! Кто дрогнет первым?';
}

function genCode(){ return Array.from({length:4},()=>'ABCDEFGHJKLMNPQRSTUVWXYZ'[Math.random()*24|0]).join(''); }

async function createRoom(){
  AU.cl();
  ME=1;
  ROOM=genCode();
  const myName = document.getElementById('myName').value.trim()||'Игрок 1';
  names.p1 = myName;
  document.getElementById('roomCode').textContent = ROOM;
  await write('host', myName);
  await write('phase','waiting');
  await write('scores/p1', 0);
  await write('scores/p2', 0);

  // Listen for player 2
  listen('guest', val=>{
    if(val){
      names.p2 = val;
      document.getElementById('hostStatus').innerHTML = `<span class="cb">✓ ${val} подключился!</span>`;
      document.getElementById('bstart').disabled = false;
    }
  });
}

async function joinRoom(){
  AU.cl();
  ME=2;
  ROOM = document.getElementById('joinCode').value.trim().toUpperCase();
  const myName = document.getElementById('myName').value.trim()||'Игрок 2';
  names.p2 = myName;

  const status = document.getElementById('joinStatus');
  const host = await read('host');
  if(!host){ status.textContent='Комната не найдена'; return; }
  names.p1 = host;
  await write('guest', myName);
  status.innerHTML = `<span class="cb">✓ Подключено! Хост: ${host}</span>`;

  // Wait for game start
  listen('phase', val=>{
    if(val==='playing'){
      unlisten('phase');
      initGame();
    }
  });
}

async function startGame(){
  AU.cl();
  await write('phase','playing');
  initGame();
}

// ROUND RENDERING
// ═══════════════════════════════════════
function startRound(ri){
  currentRound = ri;
  if(ri >= R.length){
    showResults();
    return;
  }
  const r = R[ri];
  // Build intro slide
  const introIdx = mk(`
    <div class="ri">
      <div class="rn">Раунд ${ri+1} из ${R.length}</div>
      <div class="rt">${r.icon} ${r.name}</div>
      <div class="rd">${r.desc}</div>
      <div style="margin-bottom:.5rem"><span style="font-family:var(--fd);font-size:.75rem;color:var(--accent)">×${r.w}</span></div>
      <button class="btn b1 ri-go">Поехали! 🚀</button>
    </div>
  `);

  go(introIdx);

  // "Поехали" button — trigger for both players
  sls[introIdx].querySelector('.ri-go').onclick = ()=>{
    AU.cl();
    trigger(`round_${ri}_start`);
    launchRound(ri);
  };

  // Listen for trigger from other player
  onTrigger(`round_${ri}_start`, ()=>{
    launchRound(ri);
  });
}

let roundLaunched = {};
function launchRound(ri){
  if(roundLaunched[ri]) return;
  roundLaunched[ri] = true;
  const r = R[ri];

  switch(r.type){
    case 'compete': runCompete(ri); break;
    case 'emoji': runEmoji(ri); break;
    case 'stake': runStake(ri); break;
    case 'alias': runAlias(ri); break;
    case 'sound_guess': runSoundGuess(ri); break;
    case 'blitz': runBlitz(ri); break;
  }
}

// ────── COMPETE ──────
function runCompete(ri){
  const r = R[ri];
  let qi = 0;
  function showQ(qi){
    if(qi >= r.qs.length){ showRoundSummary(ri); return; }
    const q = r.qs[qi];
    updDots(ri, qi, r.qs.length);
    const letters = ['A','B','C','D'];
    const idx = mk(`
      <div class="qc">
        <div class="qb">Вопрос ${qi+1} из ${r.qs.length}</div>
        <div class="tt" id="tt_${ri}_${qi}">${r.time}</div>
        <div class="tb"><div class="fl" id="tb_${ri}_${qi}" style="width:100%"></div></div>
        <div class="qt">${q.text}</div>
        <div class="ag">
          ${q.opts.map((o,i)=>`<button class="ba copt" data-i="${i}"><span class="lt">${letters[i]}</span>${o}</button>`).join('')}
        </div>
      </div>
    `);
    go(idx);

    const startTime = Date.now();
    let answered = false;

    // Timer
    startTimer(r.time,
      document.getElementById(`tt_${ri}_${qi}`),
      document.getElementById(`tb_${ri}_${qi}`),
      ()=>{
        if(!answered){
          answered=true;
          // Time up — 0 points, show correct
          const btns = sls[idx].querySelectorAll('.copt');
          btns.forEach((b,i)=>{
            b.classList.add('lk');
            if(i===q.c) b.classList.add('ok');
          });
          showFeedback(false, 0, q.det, ()=>{
            if(q.clip) playClip(q.clip, q.clipStart||0, 6);
            trigger(`compete_${ri}_${qi}_done`);
            nextCompeteQ(ri, qi);
          });
        }
      }
    );

    // Click handler
    sls[idx].querySelectorAll('.copt').forEach(btn=>{
      btn.onclick = ()=>{
        if(answered) return;
        answered = true;
        AU.cl();
        stopTimer();
        const pick = parseInt(btn.dataset.i);
        const ok = pick === q.c;
        const elapsed = (Date.now()-startTime)/1000;
        let pts = 0;
        if(ok){
          pts = 1;
          if(elapsed<5) pts+=2;
          else if(elapsed<10) pts+=1;
          pts *= r.w;
          addScore(pts);
        }
        // Show correct/wrong
        const btns = sls[idx].querySelectorAll('.copt');
        btns.forEach((b,i)=>{
          b.classList.add('lk');
          if(i===q.c) b.classList.add('ok');
          if(i===pick && !ok) b.classList.add('no');
        });
        showFeedback(ok, pts, q.det, ()=>{
          if(ok && q.clip) playClip(q.clip, q.clipStart||0, 6);
          trigger(`compete_${ri}_${qi}_done`);
          nextCompeteQ(ri, qi);
        });
      };
    });
  }

  function nextCompeteQ(ri, qi){
    // Wait for opponent too
    const next = ()=> showQ(qi+1);
    // Either we trigger or opponent triggers — both move
    let moved = false;
    const tryMove = ()=>{ if(!moved){ moved=true; next(); } };
    onTrigger(`compete_${ri}_${qi}_done`, tryMove);
    // If we just triggered above, tryMove may fire immediately via our own trigger
  }

  showQ(0);
}

function runStake(ri){

            </div>
          </div>
          <div style="margin:.6rem 0">
            <button class="btn b2 bs stk-reveal" id="stk_rev_${ri}_${qi}" ${q.facts.length<=1?'style="display:none"':''}>Открыть ещё факт 🔍</button>
          </div>
          <div style="font-size:.8rem;color:var(--dim);margin:.5rem 0">Твоя ставка:</div>
          <div class="sr" id="stk_bet_${ri}_${qi}">
            <button class="sb_ stk-b" data-bet="1">1</button>
            <button class="sb_ stk-b" data-bet="2">2</button>
            <button class="sb_ stk-b" data-bet="3">3</button>
          </div>
          <div id="stk_opts_${ri}_${qi}" style="display:none">
            <div class="ag">
              ${q.opts.map((o,i)=>`<button class="ba stk-ans" data-i="${i}">${o}</button>`).join('')}
            </div>
          </div>
        </div>
      </div>
    `);
    go(idx);

    let factIdx = 1;
    let chosenBet = 0;
    let answered = false;

    // Reveal more facts
    sls[idx].querySelector('.stk-reveal').onclick = ()=>{
      if(factIdx < q.facts.length){
        const cont = document.getElementById(`stk_facts_${ri}_${qi}`);
        cont.innerHTML += `<div style="background:var(--surface2);border-radius:12px;padding:.7rem 1rem;margin:.4rem 0;font-size:.85rem;border:1px solid rgba(255,255,255,.08);animation:fu .3s ease forwards">💡 ${q.facts[factIdx]}</div>`;
        factIdx++;
        if(factIdx >= q.facts.length){
          document.getElementById(`stk_rev_${ri}_${qi}`).style.display='none';
        }
      }
    };

    // Bet selection
    sls[idx].querySelectorAll('.stk-b').forEach(btn=>{
      btn.onclick = ()=>{
        AU.cl();
        sls[idx].querySelectorAll('.stk-b').forEach(b=>b.classList.remove('pk'));
        btn.classList.add('pk');
        chosenBet = parseInt(btn.dataset.bet);
        // Show answer options
        document.getElementById(`stk_opts_${ri}_${qi}`).style.display='block';
      };
    });

    // Answer
    sls[idx].querySelectorAll('.stk-ans').forEach(btn=>{
      btn.onclick = ()=>{
        if(answered || !chosenBet) return;
        answered = true;
        AU.cl();
        const pick = parseInt(btn.dataset.i);
        const ok = pick === q.c;
        let pts = ok ? chosenBet*2*r.w : -chosenBet;
        addScore(pts);

        const btns = sls[idx].querySelectorAll('.stk-ans');
        btns.forEach((b,i)=>{
          b.classList.add('lk');
          if(i===q.c) b.classList.add('ok');
          if(i===pick && !ok) b.classList.add('no');
        });

        showFeedback(ok, pts, q.det, ()=>{
          if(ok && q.clip) playClip(q.clip, q.clipStart||0, 6);
          trigger(`stake_${ri}_${qi}_done`);
          nextStakeQ(ri, qi);
        });
      };
    });
  }

  function nextStakeQ(ri, qi){
    let moved=false;
    const tryMove=()=>{ if(!moved){moved=true; showQ(qi+1);} };
    onTrigger(`stake_${ri}_${qi}_done`, tryMove);
  }

  showQ(0);
}

// ────── ALIAS ──────
function runAlias(ri){
  const r = R[ri];
  // Determine roles: p1 describes in odd games, p2 in even (or based on room)
  // For simplicity: Host (p1) describes first
  const isDescriber = ME===1;
  const cards = r.cards.slice(); // copy
  let cardIdx = 0;
  let aliasScore = 0;
  let aliasRunning = false;

  if(isDescriber){
    // Describer sees cards, clicks "Угадал!" or "Пропуск"
    const idx = mk(`
      <div class="qc" style="padding-top:60px">
        <div class="qb">Ты объясняешь!</div>
        <div class="tt" id="alias_tt">${r.time}</div>
        <div class="tb"><div class="fl" id="alias_tb" style="width:100%"></div></div>
        <div class="alias-card" id="alias_card">Нажми «Старт» чтобы начать</div>
        <div style="display:flex;gap:.6rem;justify-content:center;margin-top:.8rem">
          <button class="btn b1" id="alias_start">Старт 🎤</button>
        </div>
        <div style="display:none;gap:.6rem;justify-content:center;margin-top:.8rem" id="alias_btns">
          <button class="btn b1" id="alias_ok">Угадал! ✅</button>
          <button class="btn b2" id="alias_skip">Пропуск ⏭️</button>
        </div>
        <div class="alias-score-big" id="alias_sc">0</div>
      </div>
    `);
    go(idx);

    document.getElementById('alias_start').onclick = ()=>{
      AU.cl();
      aliasRunning = true;
      document.getElementById('alias_start').style.display='none';
      document.getElementById('alias_btns').style.display='flex';
      showCard();
      trigger(`alias_${ri}_start`);
      startTimer(r.time,
        document.getElementById('alias_tt'),
        document.getElementById('alias_tb'),
        ()=>{
          aliasRunning = false;
          // Time's up
          write(`alias_result/${ri}`, aliasScore);
          trigger(`alias_${ri}_end`);
          showAliasDone(ri, aliasScore);
        }
      );
    };

    function showCard(){
      if(cardIdx >= cards.length){ cardIdx=0; } // cycle if needed
      const c = cards[cardIdx];
      document.getElementById('alias_card').innerHTML = `
        <div>
          <div style="font-size:1.1rem">${c.song}</div>
          <div style="font-size:.7rem;color:var(--dim);margin-top:.3rem">${c.artist}</div>
        </div>
      `;
    }

    document.getElementById('alias_ok').onclick = ()=>{
      if(!aliasRunning) return;
      AU.ok();
      aliasScore++;
      const pts = 1 * r.w;
      addScore(pts);
      document.getElementById('alias_sc').textContent = aliasScore;
      write(`alias_score/${ri}`, aliasScore);
      cardIdx++;
      showCard();
    };

    document.getElementById('alias_skip').onclick = ()=>{
      if(!aliasRunning) return;
      AU.cl();
      cardIdx++;
      showCard();
    };

  } else {
    // Guesser — sees "Слушай и угадывай!"
    const idx = mk(`
      <div class="qc" style="padding-top:60px">
        <div class="qb">Ты угадываешь!</div>
        <div class="tt" id="alias_tt_g">—</div>
        <div class="tb"><div class="fl" id="alias_tb_g" style="width:100%"></div></div>
        <div class="alias-card">🎧 Слушай партнёра и называй ответ вслух!</div>
        <div class="alias-score-big" id="alias_sc_g">0</div>
        <div style="color:var(--dim);font-size:.8rem">Угадано карточек</div>
      </div>
    `);
    go(idx);

    // Wait for start
    onTrigger(`alias_${ri}_start`, ()=>{
      startTimer(r.time,
        document.getElementById('alias_tt_g'),
        document.getElementById('alias_tb_g'),
        ()=>{}
      );
    });

    // Listen for score updates
    listen(`alias_score/${ri}`, val=>{
      if(val!==null){
        const scEl = document.getElementById('alias_sc_g');
        if(scEl) scEl.textContent = val;
        // Guesser also gets points
        const diff = val - aliasScore;
        if(diff > 0){
          aliasScore = val;
          addScore(diff * r.w);
        }
      }
    });

    // Wait for end
    onTrigger(`alias_${ri}_end`, ()=>{
      stopTimer();
      read(`alias_result/${ri}`).then(total=>{
        showAliasDone(ri, total||0);
      });
    });
  }

  function showAliasDone(ri, total){
    stopTimer();
    const doneIdx = mk(`
      <div style="text-align:center;max-width:480px">
        <div style="font-size:3rem;margin-bottom:.5rem">🎉</div>
        <div style="font-family:var(--fd);font-size:1.3rem;font-weight:800;margin-bottom:.5rem">Раунд окончен!</div>
        <div class="alias-score-big">${total}</div>
        <div style="color:var(--dim);font-size:.85rem;margin-bottom:1rem">карточек угадано</div>
        <button class="btn b1 alias-done-btn">Дальше →</button>
      </div>
    `);
    go(doneIdx);

    sls[doneIdx].querySelector('.alias-done-btn').onclick = ()=>{
      trigger(`alias_${ri}_next`);
      showRoundSummary(ri);
    };
    onTrigger(`alias_${ri}_next`, ()=>{
      showRoundSummary(ri);
    });
  }
}

// ────── SOUND GUESS ──────
function runSoundGuess(ri){
  const r = R[ri];
  let qi = 0;

  function showQ(qi){

    const q = r.qs[qi];
    updDots(ri, qi, r.qs.length);

    const idx = mk(`
      <div class="qc">
        <div class="qb">Мелодия ${qi+1} из ${r.qs.length}</div>
        <div class="sg-bar">
          <div class="sg-time" id="sg_time_${ri}_${qi}">▶ Играет...</div>

        </div>
        <div class="fti">
          <input class="inp" id="sg_inp_${ri}_${qi}" placeholder="Песня или артист..." autocomplete="off">
          <div style="margin-top:.5rem">

          </div>
        </div>

      </div>
    `);
    go(idx);

    let answered = false;
    let songStartTime = Date.now();

    // Countdown 3-2-1 then play
    showCountdown(()=>{
      songStartTime = Date.now();
      const audio = playSong(q.src, q.startAt||0);
      // Update progress bar
      const fillEl = document.getElementById(`sg_fill_${ri}_${qi}`);
      const timeEl = document.getElementById(`sg_time_${ri}_${qi}`);
      const progInterval = setInterval(()=>{
        if(!audio || audio.paused || answered){
          clearInterval(progInterval);
          return;
        }
        const elapsed = audio.currentTime - (q.startAt||0);
        const total = r.time;
        const pct = Math.min(100, (elapsed/total)*100);
        if(fillEl) fillEl.style.width = pct+'%';
        if(timeEl) timeEl.textContent = `▶ ${Math.floor(elapsed)}с`;
      }, 200);

      // Auto-stop after time
      startTimer(r.time,null,null,()=>{
        if(!answered){
          answered=true;
          stopSong();
          showFeedback(false, 0, q.det, ()=>{
            trigger(`sg_${ri}_${qi}_done`);
            nextSGQ(ri, qi);
          });
        }
      });
    });

    const submit = ()=>{
      if(answered) return;
      const inp = document.getElementById(`sg_inp_${ri}_${qi}`);
      const val = inp.value.trim();
      if(!val) return;
      answered = true;
      AU.cl();
      stopTimer();
      stopSong();

      const elapsed = (Date.now()-songStartTime)/1000;
      const songMatch = q.answers.song ? FM.check(val, q.answers.song) : {match:false};
      const artistMatch = q.answers.artist ? FM.check(val, q.answers.artist) : {match:false};

      let ok=false, pts=0;
      if(songMatch.match){
        ok=true; pts=3*r.w;
        // Bonus for speed
        if(elapsed<5) pts+=2;
        else if(elapsed<10) pts+=1;
      } else if(artistMatch.match){
        ok=true; pts=1*r.w;
      }
      if(ok) addScore(pts);

      showFeedback(ok, pts, q.det, ()=>{
        trigger(`sg_${ri}_${qi}_done`);
        nextSGQ(ri, qi);
      });
    };

    document.getElementById(`sg_sub_${ri}_${qi}`).onclick = submit;
    document.getElementById(`sg_inp_${ri}_${qi}`).onkeydown = e=>{ if(e.key==='Enter') submit(); };
  }

  function nextSGQ(ri, qi){
    let moved=false;
    const tryMove=()=>{ if(!moved){moved=true; showQ(qi+1);} };
    onTrigger(`sg_${ri}_${qi}_done`, tryMove);
  }

  showQ(0);
}

function showCountdown(cb){
  let n=3;
  const div = document.createElement('div');
  div.className='cd-overlay';
  div.innerHTML=`<div class="cd-num">${n}</div>`;
  document.body.appendChild(div);
  AU.tk();
  const iv = setInterval(()=>{
    n--;
    if(n>0){
      div.innerHTML=`<div class="cd-num">${n}</div>`;
      AU.tk();
    } else {
      clearInterval(iv);
      div.innerHTML=`<div class="cd-num">🎵</div>`;
      AU.cl();
      setTimeout(()=>{
        div.remove();
        cb();
      },500);
    }
  },1000);
}

// ROUND SUMMARY

let summaryShown = {};
function showRoundSummary(ri){
  if(summaryShown[ri]) return;
  summaryShown[ri] = true;

  const total = scores.p1 + scores.p2 || 1;
  const p1pct = Math.round((scores.p1/total)*100);
  const p2pct = 100 - p1pct;
  const motivation = getMotivation(ri);

  const isLast = ri >= R.length - 1;

  const idx = mk(`
    <div class="rsm">
      <div class="rsm-t">${R[ri].icon} ${R[ri].name} — итоги</div>
      <div class="rsm-sc">
        <div class="rsm-p">
          <div class="rsm-n">${names.p1||'P1'}</div>
          <div class="rsm-v ${scores.p1>=scores.p2?'ld':''}">${scores.p1}</div>
        </div>
        <div class="rsm-p">
          <div class="rsm-n">${names.p2||'P2'}</div>
          <div class="rsm-v ${scores.p2>=scores.p1?'ld':''}">${scores.p2}</div>
        </div>
      </div>
      <div class="rsm-bar">
        <div style="width:${p1pct}%;background:var(--accent3)"></div>
        <div style="width:${p2pct}%;background:var(--accent2)"></div>
      </div>
      <div class="rsm-msg">${motivation}</div>
      <button class="btn b1">${isLast?'Результаты 🏆':'Дальше →'}</button>
    </div>
  `);
  go(idx);

  sls[idx].querySelector('.btn').onclick = ()=>{
    AU.cl();
    trigger(`summary_${ri}_done`);
    if(isLast) showResults();
    else startRound(ri+1);
  };
  onTrigger(`summary_${ri}_done`, ()=>{
    if(isLast) showResults();
    else startRound(ri+1);
  });
}

let resultsShown = false;
function showResults(){
  if(resultsShown) return;
  resultsShown = true;

  const winner = scores.p1 > scores.p2 ? names.p1 : scores.p2 > scores.p1 ? names.p2 : null;
  const tie = scores.p1 === scores.p2;

  AU.ff();
  spawnConfetti();

  const idx = mk(`
    <div class="res">

          <div class="fn">${names.p1||'P1'}</div>
          <div class="fv">${scores.p1}</div>
        </div>
        <div class="fcd">
          <div class="fn">${names.p2||'P2'}</div>
          <div class="fv">${scores.p2}</div>
        </div>
      </div>

        <button class="btn b1" onclick="location.reload()">Играть снова 🔄</button>

  // Auto-delete room after 5 min
  setTimeout(()=>{
    if(ROOM) db.ref(`rooms/${ROOM}`).remove().catch(()=>{});

}

function spawnConfetti(){
  const colors=['#f0c040','#ff6b6b','#4ecdc4','#a78bfa','#22c55e','#ff9f43'];
  for(let i=0;i<60;i++){
    const el=document.createElement('div');
    el.className='cnf';
    el.style.cssText=`left:${Math.random()*100}vw;font-size:${12+Math.random()*16}px;animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*2}s;color:${colors[Math.random()*colors.length|0]}`;
    el.textContent=['🎵','🎶','⭐','✨','🎉','🎊','🏆'][Math.random()*7|0];
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),6000);
  }
}

buildLobby();
